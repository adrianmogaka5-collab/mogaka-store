<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Mogaka Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>MOGAKA ONLINE STORE</h1></header>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart (<span id="cartCount">0</span>)</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main>
        <h2 style="text-align:center;">Our Full Catalog</h2>
        <div class="product-container">
            <div class="product-card">
                <img src="laptop.jpg" alt="Laptop" onerror="this.src='https://via.placeholder.com/300x200?text=Laptop'">
                <h3>High-End Laptop</h3>
                <p class="price">$850.00</p>
                <button class="buy-btn" onclick="addToCart('High-End Laptop', 850)">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="phone.jpg" alt="Phone" onerror="this.src='https://via.placeholder.com/300x200?text=Phone'">
                <h3>Smartphone X</h3>
                <p class="price">$600.00</p>
                <button class="buy-btn" onclick="addToCart('Smartphone X', 600)">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="headphones.jpg" alt="Headphones" onerror="this.src='https://via.placeholder.com/300x200?text=Headphones'">
                <h3>Wireless Headphones</h3>
                <p class="price">$120.00</p>
                <button class="buy-btn" onclick="addToCart('Wireless Headphones', 120)">Add to Cart</button>
            </div>
        </div>
    </main>

    <footer style="background-color: #222; color: white; padding: 40px 20px; margin-top: 50px;">
        <div style="text-align: center;">
            <p>&copy; 2026 Mogaka Online Store. Secure M-PESA Payments Accepted.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
