<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Mogaka Online Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; font-family: Arial, sans-serif; background-color: #fdfdfd;">

    <header style="background: #1a1a2e; color: white; padding: 25px 15px; text-align: center;">
        <h1 style="margin: 0 0 15px 0;">MOGAKA TECH CATALOG</h1>
        <nav style="margin-bottom: 15px;">
            <a href="index.html" style="color:white; margin:10px; text-decoration:none;">Home</a>
            <a href="products.html" style="color:white; margin:10px; text-decoration:none; border-bottom: 2px solid white;">Products</a>
            <a href="cart.html" style="color:white; margin:10px; text-decoration:none;">Cart <span id="cart-count">(0)</span></a>
        </nav>
        <div style="margin-top: 10px;">
            <label style="font-size: 12px; opacity: 0.8;">Currency: </label>
            <select id="currency-selector" onchange="renderProducts();" style="padding: 6px; border-radius: 5px; cursor: pointer;">
                <option value="KSh" selected>KSh (M-PESA)</option>
                <option value="USD">USD ($)</option>
            </select>
        </div>
    </header>

    <main style="padding: 20px; max-width: 1200px; margin: auto;">
        <div style="text-align: center; margin-bottom: 25px;">
            <input type="text" id="search-input" placeholder="Search brands (HP, Apple, Samsung...)" onkeyup="filterAll()" 
            style="width: 90%; max-width: 500px; padding: 12px; border-radius: 25px; border: 2px solid #eee; outline: none;">
        </div>

        <div style="text-align: center; margin-bottom: 30px;">
            <button class="category-btn active" id="btn-All" onclick="setCategory('All')">All</button>
            <button class="category-btn" id="btn-Laptops" onclick="setCategory('Laptops')">Laptops</button>
            <button class="category-btn" id="btn-Phones" onclick="setCategory('Phones')">Phones</button>
        </div>

        <div id="product-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; min-height: 400px;">
            </div>

        <section style="margin-top: 60px; padding: 30px; background: white; border-radius: 15px; border: 1px solid #eee;">
            <h2 style="border-bottom: 2px solid #1a1a2e; padding-bottom: 10px;">Customer Reviews</h2>
            <div id="reviews-display">
                <div style="padding: 15px; border-left: 4px solid #f1c40f; background: #fffcf0; margin-bottom: 15px;">
                    <strong>Bernadette K. ★★★★★</strong>
                    <p>"Original quality and fast delivery to Kisii!"</p>
                </div>
            </div>
        </section>
    </main>

    <footer style="text-align: center; padding: 40px 20px; background: #f9f9f9; margin-top: 50px;">
        <div style="background: #e8f5e9; color: #2e7d32; padding: 8px 18px; border-radius: 20px; display: inline-block; font-weight: bold; border: 1px solid #2e7d32;">
            ✅ Verified Mogaka Store Seller
        </div>
        <p style="color: #888; font-size: 14px; margin-top: 15px;">M-PESA Number: 0769128327</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
