<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Mogaka Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>MOGAKA ONLINE STORE</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main style="max-width: 800px; margin: 20px auto; padding: 20px; background: #f9f9f9; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
        <h2 style="text-align: center; color: #333;">Shopping Cart Summary</h2>
        
        <div id="cartItems" style="margin-bottom: 20px;">
            </div>

        <div style="border-top: 2px solid #333; padding-top: 10px; display: flex; justify-content: space-between; font-size: 1.2rem;">
            <strong>Total Amount:</strong>
            <strong>$<span id="cartTotal">0.00</span></strong>
        </div>

        <hr style="margin: 30px 0;">

        <h3 style="color: #333;">Delivery Details</h3>
        <form onsubmit="processOrder(event)" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="text" id="custName" placeholder="Full Name" required style="padding: 12px; border: 1px solid #ccc; border-radius: 4px;">
            <input type="text" id="custPhone" placeholder="Phone Number (M-PESA)" required style="padding: 12px; border: 1px solid #ccc; border-radius: 4px;">
            <textarea id="custAddress" placeholder="Delivery Address / City" required style="padding: 12px; border: 1px solid #ccc; border-radius: 4px; height: 80px;"></textarea>
            
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button type="submit" class="buy-btn" style="flex: 2; background-color: #28a745; color: white; padding: 15px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 1rem;">PLACE ORDER</button>
                <button type="button" onclick="clearCart()" style="flex: 1; background-color: #dc3545; color: white; border: none; cursor: pointer; border-radius: 5px;">Empty Cart</button>
            </div>
        </form>

        <div style="text-align: center; margin-top: 25px;">
            <a href="products.html" style="text-decoration: none; color: #007bff; font-weight: bold; font-size: 0.9rem;">← Continue Shopping</a>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // Immediately loads the cart items when this page is opened
        window.onload = displayCart;
    </script>
</body>
</html>
